        function draw(context, vid) {
console.log("draw-> context:"+ context );
            context.drawImage(vid, 0, 0, 1280, 720);
            if (!window.stop_request_animation_frame)
                requestAnimationFrame(draw.bind(this, context, vid));
        }
		
		
		
  function save_as (blob, name) {
		
console.log("save_as: "+ name);
			
            var url = window.URL.createObjectURL(blob);
            var a = document.createElement("a");
            a.download = name;
            a.href = url;
            a.target = "_blank";
            a.style.margin = "3px";
            a.textContent = "Record " + nb_record;
            document.body.appendChild(a);
            nb_record++;
        }
		
		
        function record_user_stream (stream) {
            window.mediaRecorder = new MediaRecorder(stream, {});
            var buffer = [];
            window.mediaRecorder.ondataavailable = function (event) {
                if (event.data.size > 0) {
                    buffer.push(event.data);
                    console.log("stored blobs : " + buffer.length);
                } else {
                    console.log("null blob", event.data);
                }
            };
			
			
			
    window.mediaRecorder.onstop = function () {
console.log("mediarecorder stop");
                window.stop_request_animation_frame = true;
                document.getElementById("record_btn").removeAttribute("disabled");
				
                document.getElementById("record_btn_canvas").removeAttribute("disabled");
				
                blob = new Blob(buffer, {"type": "webm"});
                save_as(blob, "test.webm");
                try {
                    window.current_stream.stop();
                } catch (exception) {
                    var video_tracks = window.current_stream.getVideoTracks();
                    for (var i = 0; i < video_tracks.length; i++) {
                        var track = video_tracks[i];
                        track.stop();
                    }
                    var audio_tracks = window.current_stream.getAudioTracks();
                    for (var i = 0; i < audio_tracks.length; i++) {
                        var track = audio_tracks[i];
                        track.stop();
                    }
                }
            };
            window.mediaRecorder.start();
            setTimeout(function () {
                window.mediaRecorder.stop();
            }, 5000);
        }
