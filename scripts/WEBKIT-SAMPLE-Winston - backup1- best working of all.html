function supportsRecording(mimeType)
{
    if (!window.MediaRecorder)
        return false;
    if (!MediaRecorder.isTypeSupported)
        return mimeType.startsWith("audio/mp4") || mimeType.startsWith("video/mp4");
    return MediaRecorder.isTypeSupported(mimeType);
}

       function makeVid(url) { // helper to create a video element
        const v = document.createElement('video');
        v.preload = 'metadata';
        return new Promise((res, rej) => {
          v.onloadedmetadata = e => {
            console.log(e);
            // chrome duration bug...            // see https://bugs.chromium.org/p/chromium/issues/detail?id=642012        // will also occur in next FF versions, in worse...
            if (v.duration === Infinity) {
              v.onseeked = e => {
                v._duration = v.currentTime; // FF new bug never updates duration to correct value
                v.onseeked = null;
                v.currentTime = 0;
                res(v);
              };
              v.currentTime = 1e5; // big but not too big either
            } else {
              v._duration = v.duration;
              res(v);
            }
          };
          v.onerror = rej;
          v.src = url;
        });
      };
