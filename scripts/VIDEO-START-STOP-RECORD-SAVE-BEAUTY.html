		function getSupportedMimeTypes() {
				const possibleTypes = [
						'video/webm;codecs=vp9,opus',
						'video/webm;codecs=vp8,opus',
						'video/webm;codecs=h264,opus',
						'video/webm;codecs=av01,opus',
						'video/mp4;codecs=h264,aac',
						'video/mp4;codecs=avc1,mp4a.40.2',
						'video/mp4',
						];
					return possibleTypes.filter(mimeType => {
					return MediaRecorder.isTypeSupported(mimeType);
					});
		}





	  	 
	async function startRecording() {

	
							recordedBlobs = [];
							const mimeType = codecPreferences.options[codecPreferences.selectedIndex].value;
									const options = {mimeType};
/*	 options =  navigator.mediaDevices.getUserMedia(constraints)
                                   .then((stream) => {
                                                  const options = {
                                                        audioBitsPerSecond: 128000,//48000v
                                                        videoBitsPerSecond: 2500000,
                                                        mimeType: "video/webm",
                                                       }
	*/
									
									
									
									if (mimeType.split(';', 1)[0] === 'video/mp4') {
										// Adjust sampling rate to 48khz.
										const track = window.stream.getAudioTracks()[0];
										
//console.log("===Stream-Audio-Tracks ===\n" +track.label);	
										
										
										const {sampleRate} = track.getSettings();
												if (sampleRate != 128000) {
													track.stop();
													window.stream.removeTrack(track);
													const newStream = await navigator.mediaDevices.getUserMedia({video: { videoBitsPerSecond: 2500000}, audio: {sampleRate: 128000}});//48000
													window.stream.addTrack(newStream.getTracks()[0]);
												}
									}
							try {
									mediaRecorder = new MediaRecorder(window.stream, options);
									} catch (e) {
		console.error('Exception while creating MediaRecorder:', e);
											errorMsgElement.innerHTML = `Exception while creating MediaRecorder: ${JSON.stringify(e)}`;
											return;
							}

		//console.log('Created MediaRecorder', mediaRecorder, 'with options', options);
						recordButton.textContent = 'Stop recording';
						playButton.disabled = true;
						downloadButton.disabled = true;
						codecPreferences.disabled = true;
							mediaRecorder.onstop = (event) => {
		//console.log('Recorder stopped: ', event);
		//console.log('Recorded Blobs: ', recordedBlobs);
							};
							mediaRecorder.ondataavailable = handleDataAvailable;
							mediaRecorder.start();
		//console.log('MediaRecorder started', mediaRecorder);
				}// end startRecording

		async function init(constraints) {
						try {
